<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgeCheck</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,800&family=PT+Sans:ital,wght@1,700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:#06140F;
display:flex;
align-items:center;
justify-content:center;
color:#E8E3D8;
font-family:Arial,sans-serif;
}

.box{
width:90%;
max-width:420px;
background:#0B1712;
padding:35px;
border-radius:18px;
border:1px solid #1F5A45;
text-align:center;
box-shadow:0 0 25px #1F5A45;
}

.tela{
display:none;
}

.ativa{
display:block;
}

h1{
font-family:"PT Sans",sans-serif;
font-style:italic;
font-size:45px;
color:#F5B800;
}

h2{
color:#F5B800;
margin-bottom:15px;
}

p{
margin:15px 0;
}

input{
width:100%;
padding:13px;
margin:8px 0;
border-radius:8px;
border:1px solid #1F5A45;
background:#06140F;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:0;
border-radius:10px;
background:#F5B800;
color:#06140F;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

button:hover{
box-shadow:0 0 20px #F5B800;
}

.erro{
color:red;
font-family:"Poppins",sans-serif;
font-style:italic;
font-size:28px;
margin-top:15px;
}

.ok{
color:#F5B800;
font-size:25px;
margin-top:15px;
}
</style>

</head>

<body>

<div class="box">

<div id="inicio" class="tela ativa">
<h1>AgeCheck</h1>
<p>Informação e prevenção para escolhas mais conscientes.</p>

<button onclick="abrir('identidade')">
COMEÇAR
</button>
</div>


<div id="identidade" class="tela">

<h2>Verificação de identidade</h2>

<input id="nome" placeholder="Nome completo">

<input id="cpf" placeholder="CPF">

<p id="tent">Tentativas restantes: 3</p>

<button onclick="verificar()">
VERIFICAR
</button>

<div id="msg"></div>

</div>


<div id="idade" class="tela">

<h2>Verificação de idade</h2>

<input id="data" type="date">

<button onclick="idade()">
CONTINUAR
</button>

<div id="msgIdade"></div>

</div>


</div>


<script>

let tentativas=3;


function abrir(id){

document.querySelectorAll(".tela").forEach(t=>{
t.classList.remove("ativa");
});

document.getElementById(id).classList.add("ativa");

}



function validarCPF(cpf){

cpf=cpf.replace(/\D/g,"");

if(cpf.length!=11) return false;

if(/^(\d)\1+$/.test(cpf)) return false;


let soma=0;

for(let i=0;i<9;i++)
soma+=cpf[i]*(10-i);

let resto=(soma*10)%11;

if(resto==10) resto=0;

if(resto!=cpf[9]) return false;


soma=0;

for(let i=0;i<10;i++)
soma+=cpf[i]*(11-i);

resto=(soma*10)%11;

if(resto==10) resto=0;

return resto==cpf[10];

}



function verificar(){

let nome=document.getElementById("nome").value;
let cpf=document.getElementById("cpf").value;
let msg=document.getElementById("msg");


if(nome.length<5 || !validarCPF(cpf)){

tentativas--;

document.getElementById("tent").innerHTML=
"Tentativas restantes: "+tentativas;


msg.innerHTML=
"<div class='erro'>REPROVADO</div>";


if(tentativas<=0){

document.querySelector("#identidade button").disabled=true;

msg.innerHTML=
"<div class='erro'>ACESSO BLOQUEADO</div>";

}

return;

}


msg.innerHTML=
"<div class='ok'>IDENTIDADE CONFIRMADA</div>";


setTimeout(()=>{
abrir("idade");
},1200);

}



function idade(){

let data=document.getElementById("data").value;

if(!data)return;


let nasc=new Date(data);
let hoje=new Date();


let idade=
hoje.getFullYear()-nasc.getFullYear();


let mes=
hoje.getMonth()-nasc.getMonth();


if(mes<0 || (mes==0 && hoje.getDate()<nasc.getDate()))
idade--;


if(idade>=18){

document.getElementById("msgIdade").innerHTML=
"<div class='ok'>ACESSO PERMITIDO</div>";

}else{

document.getElementById("msgIdade").innerHTML=
"<div class='erro'>ACESSO NEGADO</div>";

}

}

</script>

</body>
</html>
