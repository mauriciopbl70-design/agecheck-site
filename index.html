<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgeCheck</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
}

header {
    background: #2563eb;
    padding: 30px;
}

.card {
    background: white;
    color: black;
    width: 80%;
    max-width: 400px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 15px;
}

input {
    padding: 10px;
    width: 90%;
    margin: 15px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

#resultado {
    margin-top: 20px;
}

.info {
    padding: 20px;
}
</style>

</head>

<body>

<header>
    <h1>AgeCheck</h1>
    <p>Tecnologia para prevenção do consumo de álcool por menores</p>
</header>


<div class="card">

<h2>Verificação de idade</h2>

<p>Digite sua data de nascimento:</p>

<input type="date" id="nascimento">

<br>

<button onclick="verificarIdade()">
Verificar
</button>

<h3 id="resultado"></h3>

</div>


<div class="info">

<h2>Sobre o projeto</h2>

<p>
O AgeCheck é um protótipo de sistema tecnológico
criado para auxiliar na prevenção da venda de bebidas
alcoólicas para menores de idade.
</p>

</div>



<script>

function verificarIdade(){

let nascimento = document.getElementById("nascimento").value;

if(nascimento == ""){
document.getElementById("resultado").innerHTML =
"Digite uma data válida.";
return;
}


let data = new Date(nascimento);
let hoje = new Date();


let idade = hoje.getFullYear() - data.getFullYear();

let mes = hoje.getMonth() - data.getMonth();

if(mes < 0 || (mes === 0 && hoje.getDate() < data.getDate())){
idade--;
}


if(idade >= 18){

document.getElementById("resultado").innerHTML =
"✅ Acesso permitido: maior de idade.";

}else{

document.getElementById("resultado").innerHTML =
"❌ Acesso bloqueado: menor de idade.";

}

}

</script>


</body>
</html>
