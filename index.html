
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgeCheck</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,800&family=PT+Sans:ital,wght@1,700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#06140F;
    color:#E8E3D8;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'PT Sans', sans-serif;
}

.container{
    width:90%;
    max-width:430px;
    background:#0B1712;
    padding:35px;
    border-radius:18px;
    border:1px solid #1F5A45;
    text-align:center;
    box-shadow:0 0 30px rgba(31,90,69,0.4);
}

.tela{
    display:none;
}

.ativa{
    display:block;
}

h1{
    font-size:45px;
    color:#F5B800;
    font-family:'PT Sans', sans-serif;
    font-style:italic;
}

h2{
    margin-bottom:20px;
    color:#F5B800;
}

p{
    margin:15px 0;
    font-size:18px;
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    background:#06140F;
    color:#E8E3D8;
    border:1px solid #1F5A45;
    border-radius:8px;
    outline:none;
}

input:focus{
    border-color:#F5B800;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#F5B800;
    color:#06140F;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.04);
    box-shadow:0 0 25px #F5B800;
}

.reprovado{
    margin-top:20px;
    color:#ff3030;
    font-family:'Poppins',sans-serif;
    font-style:italic;
    font-size:30px;
}

.aprovado{
    margin-top:20px;
    color:#F5B800;
    font-size:26px;
}

</style>
</head>

<body>

<div class="container">

<div id="inicio" class="tela ativa">

<h1>AgeCheck</h1>

<p>
Informação e prevenção para escolhas mais conscientes.
</p>

<button onclick="abrirIdentidade()">
COMEÇAR
</button>

</div>
  <div id="identidade" class="tela">

<h2>Verificação de identidade</h2>

<p>Digite seus dados para continuar</p>

<input id="nome" type="text" placeholder="Nome completo">

<input id="cpf" type="text" placeholder="CPF">

<p id="tentativas">
Tentativas restantes: 3
</p>

<button onclick="verificarIdentidade()">
VERIFICAR
</button>

<div id="resultado"></div>

</div>


<div id="idade" class="tela">

<h2>Verificação de idade</h2>

<p>Informe sua data de nascimento</p>

<input id="dataNascimento" type="date">

<button onclick="verificarIdade()">
CONTINUAR
</button>

<div id="resultadoIdade"></div>

</div>


<div id="final" class="tela">

<h1>Concluído</h1>

<p>
Obrigado por utilizar o sistema.
</p>

</div>


</div>


<script>

let tentativas = 3;


function trocarTela(tela){

document.querySelectorAll(".tela").forEach(function(item){

item.classList.remove("ativa");

});

document.getElementById(tela).classList.add("ativa");

}



function abrirIdentidade(){

trocarTela("identidade");

}



// validação básica do CPF

function validarCPF(cpf){

cpf = cpf.replace(/\D/g,'');

if(cpf.length !== 11){
return false;
}

if(/^(\d)\1+$/.test(cpf)){
return false;
}

let soma = 0;

for(let i=0;i<9;i++){

soma += Number(cpf.charAt(i)) * (10-i);

}

let resto = (soma*10)%11;

if(resto===10){
resto=0;
}

if(resto !== Number(cpf.charAt(9))){
return false;
}


soma=0;

for(let i=0;i<10;i++){

soma += Number(cpf.charAt(i))*(11-i);

}

resto=(soma*10)%11;

if(resto===10){
resto=0;
}

return resto === Number(cpf.charAt(10));

}



function verificarIdentidade(){

let nome=document.getElementById("nome").value;

let cpf=document.getElementById("cpf").value;

let resultado=document.getElementById("resultado");

if(nome.length < 5 || !validarCPF(cpf)){

tentativas--;

document.getElementById("tentativas").innerHTML =
"";
  document.getElementById("tentativas").innerHTML =
"");

if(tentativas > 0){

document.getElementById("tentativas").innerHTML =
"(" + tentativas + ") tentativas restantes";

resultado.innerHTML =
"<div class='reprovado'>REPROVADO</div>";

}else{

resultado.innerHTML =
"<div class='reprovado'>ACESSO BLOQUEADO</div>";

document.querySelector("#identidade button").disabled = true;

}

return;

}


resultado.innerHTML =
"<div class='aprovado'>IDENTIDADE CONFIRMADA</div>";

setTimeout(function(){

trocarTela("idade");

},1500);


}



function verificarIdade(){

let data =
document.getElementById("dataNascimento").value;


if(!data){

return;

}


let nascimento =
new Date(data);

let hoje =
new Date();


let idade =
hoje.getFullYear() -
nascimento.getFullYear();


let mes =
hoje.getMonth() -
nascimento.getMonth();


if(mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())){

idade--;

}



let resultado =
document.getElementById("resultadoIdade");


if(idade >= 18){

resultado.innerHTML =
"<div class='aprovado'>ACESSO PERMITIDO</div>";

}else{

resultado.innerHTML =
"<div class='reprovado'>ACESSO NEGADO</div>";

}


}


</script>

</body>
</html>
